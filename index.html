<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFC2 Alliance Intel</title>
<style>
:root{--bg:#050810;--panel:#0f172a;--accent:#00d4ff;--accent2:#8b5cf6;--text:#e2e8f0;--muted:#475569;--border:#1e293b;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--purple:#a855f7;--orange:#f97316}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.container{max-width:1600px;margin:0 auto;padding:20px}
header{display:flex;justify-content:space-between;align-items:center;padding:20px 0;border-bottom:1px solid var(--border);margin-bottom:20px;flex-wrap:wrap;gap:12px}
h1{font-size:1.8rem;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800}
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:10px 20px;background:var(--panel);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-weight:600;font-size:.9rem;transition:all .2s}
.tab:hover{border-color:var(--accent)}
.tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;border-color:transparent}
.view{display:none}
.view.active{display:block}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;margin-bottom:20px}
.stat-box{padding:16px;background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.2);border-radius:10px;text-align:center}
.stat-box .num{font-size:2rem;font-weight:800;color:var(--accent)}
.stat-box .label{font-size:.8rem;color:var(--muted);margin-top:4px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.card h3{font-size:.75rem;text-transform:uppercase;color:var(--muted);letter-spacing:1px;margin-bottom:12px}
input,select{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;outline:none;font-size:.9rem;width:100%}
input:focus,select:focus{border-color:var(--accent)}
.btn{padding:10px 20px;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:.9rem;transition:all .2s;display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000}
.btn:hover{transform:translateY(-2px);opacity:.9}
.btn-secondary{background:var(--panel);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent)}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
th{background:#1a2332;color:var(--accent);font-size:.72rem;text-transform:uppercase;font-weight:700;cursor:pointer;position:sticky;top:0}
th:hover{background:#1f2d40}
tr:hover{background:rgba(255,255,255,.03)}
.coords{font-family:monospace;color:var(--yellow);font-weight:700}
.alliance-tag{background:rgba(16,185,129,.15);color:var(--green);padding:2px 8px;border-radius:4px;font-size:.8rem;font-weight:600}
.rank-badge{background:rgba(245,158,11,.15);color:var(--yellow);padding:2px 6px;border-radius:4px;font-size:.75rem;font-weight:700;margin-left:4px}
.moon-tag{background:rgba(168,85,247,.15);color:var(--purple);padding:2px 6px;border-radius:4px;font-size:.7rem;font-weight:700;margin-left:4px}
.player-link{color:var(--accent);cursor:pointer;font-weight:600}
.player-link:hover{text-decoration:underline}
.heatmap{display:grid;grid-template-columns:repeat(30,1fr);gap:2px;margin-top:12px}
.heat-cell{aspect-ratio:1;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:700;cursor:pointer;transition:transform .1s}
.heat-cell:hover{transform:scale(1.3);z-index:1}
.alliance-card{display:flex;justify-content:space-between;align-items:center;padding:12px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.alliance-card:hover{border-color:var(--accent);background:rgba(0,212,255,.05)}
.alliance-card .count{color:var(--accent);font-weight:700;font-size:1.2rem}
.player-row{display:flex;justify-content:space-between;align-items:center;padding:10px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:6px;margin-bottom:6px}
.player-row .coords-list{font-size:.75rem;color:var(--muted);margin-top:2px}
.galaxy-section{margin-bottom:16px}
.galaxy-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;margin-bottom:6px;display:flex;justify-content:space-between}
.system-detail{padding:12px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
.system-detail h4{color:var(--accent);font-size:1rem;margin-bottom:8px}
.slot-grid{display:grid;grid-template-columns:repeat(15,1fr);gap:4px}
.slot-cell{padding:8px 4px;text-align:center;border-radius:4px;font-size:.75rem;font-weight:700;background:rgba(30,41,59,.5);color:var(--muted)}
.slot-cell.occupied{background:rgba(0,212,255,.2);color:var(--text);border:1px solid rgba(0,212,255,.3)}
.slot-cell.moon{background:rgba(168,85,247,.2);border:1px solid rgba(168,85,247,.3)}
.empty{text-align:center;padding:60px;color:var(--muted)}
.empty h2{font-size:1.5rem;margin-bottom:8px;color:var(--text)}
.flex{display:flex;gap:12px;flex-wrap:wrap}
.flex>*{flex:1;min-width:200px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--panel);border:1px solid var(--accent);padding:12px 20px;border-radius:8px;font-weight:600;z-index:1000;animation:slideIn .3s}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
.hidden{display:none!important}
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px}
.status-n{background:var(--green)}.status-d{background:var(--red)}.status-P{background:var(--orange)}.status-i{background:var(--purple)}.status-I{background:var(--purple)}.status-v{background:var(--accent)}
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <h1>🌌 SFC2 Alliance Intel</h1>
      <div style="color:var(--muted);font-size:.9rem;margin-top:4px">2557 planets across 3 galaxies</div>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-secondary" onclick="exportJSON()">📥 JSON</button>
      <button class="btn btn-secondary" onclick="exportCSV()">📥 CSV</button>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('dashboard')">📊 Dashboard</div>
    <div class="tab" onclick="switchTab('players')">👤 Players</div>
    <div class="tab" onclick="switchTab('alliances')">🏛️ Alliances</div>
    <div class="tab" onclick="switchTab('systems')">🗺️ Systems</div>
    <div class="tab" onclick="switchTab('table')">📋 Table</div>
  </div>

  <div class="view active" id="view-dashboard">
    <div class="stat-grid" id="statsGrid"></div>
    <div class="flex">
      <div class="card" style="flex:2">
        <h3>🔍 Quick Search</h3>
        <div class="flex" style="margin-bottom:12px">
          <input type="text" id="dashSearch" placeholder="Search player, alliance, or coords..." oninput="dashboardSearch()">
          <select id="dashGalaxy" onchange="dashboardSearch()"><option value="">All Galaxies</option></select>
        </div>
        <div id="dashResults" style="max-height:500px;overflow:auto"></div>
      </div>
      <div class="card" style="flex:1">
        <h3>🏆 Top Alliances</h3>
        <div id="topAlliances"></div>
      </div>
    </div>
    <div class="card">
      <h3>🗺️ Galaxy Heatmaps</h3>
      <div id="heatmaps"></div>
    </div>
  </div>

  <div class="view" id="view-players">
    <div class="card">
      <div class="flex" style="margin-bottom:12px">
        <input type="text" id="playerSearch" placeholder="Search player name..." oninput="renderPlayers()">
        <select id="playerAllianceFilter" onchange="renderPlayers()"><option value="">All Alliances</option></select>
        <select id="playerGalaxyFilter" onchange="renderPlayers()"><option value="">All Galaxies</option></select>
      </div>
      <div id="playersList"></div>
    </div>
  </div>

  <div class="view" id="view-alliances">
    <div class="card">
      <div class="flex" style="margin-bottom:12px">
        <input type="text" id="allianceSearch" placeholder="Search alliance..." oninput="renderAlliances()">
      </div>
      <div id="alliancesList"></div>
    </div>
  </div>

  <div class="view" id="view-systems">
    <div class="card">
      <h3>System Activity</h3>
      <div class="flex" style="margin-bottom:12px">
        <select id="sysGalaxy" onchange="renderSystems()"><option value="">Select Galaxy</option></select>
        <input type="number" id="sysSystem" placeholder="System (1-300)" oninput="renderSystems()" style="flex:0 0 180px" min="1" max="300">
      </div>
      <div id="systemResults"></div>
    </div>
  </div>

  <div class="view" id="view-table">
    <div class="card">
      <div class="flex" style="margin-bottom:12px">
        <input type="text" id="tableSearch" placeholder="Filter anything..." oninput="renderTable()">
        <select id="tableGalaxy" onchange="renderTable()"><option value="">All Galaxies</option></select>
        <select id="tableAlliance" onchange="renderTable()"><option value="">All Alliances</option></select>
      </div>
      <div style="overflow:auto;max-height:700px">
        <table>
          <thead>
            <tr>
              <th onclick="sortTable('coords')">Coords</th>
              <th onclick="sortTable('planet')">Planet</th>
              <th onclick="sortTable('player')">Player</th>
              <th onclick="sortTable('rank')">Rank</th>
              <th onclick="sortTable('alliance')">Alliance</th>
              <th onclick="sortTable('status')">Status</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

let SORT = {col:'coords',asc:true};
let filtered = [...ALL_DATA];

function switchTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('view-'+id).classList.add('active');
  if(id==='players') renderPlayers();
  if(id==='alliances') renderAlliances();
  if(id==='systems') renderSystems();
  if(id==='table') renderTable();
  if(id==='dashboard') updateDashboard();
}

function updateStats(){
  const players = new Set(ALL_DATA.map(d=>d.player).filter(Boolean));
  const alliances = new Set(ALL_DATA.map(d=>d.alliance).filter(Boolean));
  const systems = new Set(ALL_DATA.map(d=>d.galaxy+':'+d.system));
  const galaxies = [...new Set(ALL_DATA.map(d=>d.galaxy))].sort((a,b)=>a-b);
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-box"><div class="num">${ALL_DATA.length}</div><div class="label">Total Planets</div></div>
    <div class="stat-box"><div class="num">${players.size}</div><div class="label">Players</div></div>
    <div class="stat-box"><div class="num">${alliances.size}</div><div class="label">Alliances</div></div>
    <div class="stat-box"><div class="num">${systems.size}</div><div class="label">Systems</div></div>
    <div class="stat-box"><div class="num">${galaxies.length}</div><div class="label">Galaxies</div></div>
  `;
}

function updateFilters(){
  const galaxies = [...new Set(ALL_DATA.map(d=>d.galaxy))].sort((a,b)=>a-b);
  const alliances = [...new Set(ALL_DATA.map(d=>d.alliance).filter(Boolean))].sort();
  const updateSel = (id,opts,allLabel)=>{
    const sel = document.getElementById(id);
    sel.innerHTML = '<option value="">'+allLabel+'</option>';
    opts.forEach(o=>{const opt=document.createElement('option');opt.value=o;opt.textContent=o;sel.appendChild(opt);});
  };
  updateSel('dashGalaxy',galaxies,'All Galaxies');
  updateSel('playerGalaxyFilter',galaxies,'All Galaxies');
  updateSel('sysGalaxy',galaxies,'Select Galaxy');
  updateSel('tableGalaxy',galaxies,'All Galaxies');
  updateSel('playerAllianceFilter',alliances,'All Alliances');
  updateSel('tableAlliance',alliances,'All Alliances');
}

function updateHeatmaps(){
  const container = document.getElementById('heatmaps');
  const galaxies = [...new Set(ALL_DATA.map(d=>d.galaxy))].sort((a,b)=>a-b);
  container.innerHTML = '';
  galaxies.forEach(g=>{
    const section = document.createElement('div');
    section.className = 'galaxy-section';
    const gData = ALL_DATA.filter(d=>d.galaxy===g);
    const gSystems = new Set(gData.map(d=>d.system)).size;
    const label = document.createElement('div');
    label.className = 'galaxy-label';
    label.innerHTML = '<span>Galaxy '+g+'</span><span>'+gSystems+' systems &bull; '+gData.length+' planets</span>';
    section.appendChild(label);
    const grid = document.createElement('div');
    grid.className = 'heatmap';
    const systems = {};
    gData.forEach(d=>{systems[d.system]=(systems[d.system]||0)+1});
    const maxCount = Math.max(...Object.values(systems),1);
    for(let s=1;s<=300;s++){
      const cell = document.createElement('div');
      cell.className = 'heat-cell';
      cell.textContent = s;
      cell.title = 'Galaxy '+g+' System '+s+' — '+(systems[s]||0)+' planets';
      const count = systems[s]||0;
      if(count===0){cell.style.background='rgba(30,41,59,.4)';cell.style.color='var(--muted)';}
      else{const intensity=count/maxCount;cell.style.background='rgba(0,212,255,'+(0.2+intensity*0.8)+')';cell.style.color=intensity>0.5?'#000':'#fff';}
      grid.appendChild(cell);
    }
    section.appendChild(grid);
    container.appendChild(section);
  });
}

function dashboardSearch(){
  const q = document.getElementById('dashSearch').value.toLowerCase();
  const g = document.getElementById('dashGalaxy').value;
  const results = ALL_DATA.filter(d=>(!q||d.player.toLowerCase().includes(q)||(d.alliance||'').toLowerCase().includes(q)||d.coords.includes(q))&&(!g||String(d.galaxy)===g)).slice(0,100);
  const el = document.getElementById('dashResults');
  if(!results.length){el.innerHTML='<div class="empty">No matches</div>';return;}
  el.innerHTML = '<table><thead><tr><th>Coords</th><th>Planet</th><th>Player</th><th>Alliance</th></tr></thead><tbody>'+
    results.map(d=>`<tr><td class="coords">${d.coords}</td><td>${d.planet||'-'}</td><td class="player-link" onclick="showPlayer('${d.player.replace(/'/g,"\'")}')">${d.player}${d.rank?'<span class="rank-badge">#'+d.rank+'</span>':''}</td><td>${d.alliance?'<span class="alliance-tag">'+d.alliance+'</span>':'-'}</td></tr>`).join('')+'</tbody></table>';
}

function updateTopAlliances(){
  const counts = {};
  ALL_DATA.forEach(d=>{if(d.alliance)counts[d.alliance]=(counts[d.alliance]||0)+1});
  const top = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,10);
  document.getElementById('topAlliances').innerHTML = top.map(([name,count],i)=>
    `<div class="alliance-card" onclick="showAlliance('${name.replace(/'/g,"\'")}')"><div><div style="font-weight:700;color:var(--green)">#${i+1} ${name}</div><div style="font-size:.8rem;color:var(--muted)">${count} planets</div></div><div class="count">${count}</div></div>`
  ).join('');
}

function renderPlayers(){
  const q = document.getElementById('playerSearch').value.toLowerCase();
  const a = document.getElementById('playerAllianceFilter').value;
  const g = document.getElementById('playerGalaxyFilter').value;
  const players = {};
  ALL_DATA.forEach(d=>{
    if((!q||d.player.toLowerCase().includes(q))&&(!a||d.alliance===a)&&(!g||String(d.galaxy)===g)){
      if(!players[d.player])players[d.player]={player:d.player,alliance:d.alliance,count:0,coords:[],galaxies:new Set()};
      players[d.player].count++;players[d.player].coords.push(d.coords);players[d.player].galaxies.add(d.galaxy);
    }
  });
  const list = Object.values(players).sort((a,b)=>b.count-a.count);
  const el = document.getElementById('playersList');
  if(!list.length){el.innerHTML='<div class="empty">No players found</div>';return;}
  el.innerHTML = list.map(p=>`
    <div class="player-row">
      <div>
        <div style="font-weight:700;color:var(--accent)">${p.player}</div>
        <div style="font-size:.8rem;color:var(--muted)">${p.alliance?'<span class="alliance-tag">'+p.alliance+'</span>':'No alliance'} &bull; ${p.count} planets &bull; Galaxies: ${[...p.galaxies].join(', ')}</div>
        <div class="coords-list">${p.coords.slice(0,10).join(', ')}${p.coords.length>10?'...':''}</div>
      </div>
      <div style="color:var(--accent);font-weight:700;font-size:1.2rem">${p.count}</div>
    </div>
  `).join('');
}

function renderAlliances(){
  const q = document.getElementById('allianceSearch').value.toLowerCase();
  const alliances = {};
  ALL_DATA.forEach(d=>{
    if(d.alliance&&(!q||d.alliance.toLowerCase().includes(q))){
      if(!alliances[d.alliance])alliances[d.alliance]={name:d.alliance,players:new Set(),count:0,coords:[],galaxies:new Set()};
      alliances[d.alliance].players.add(d.player);alliances[d.alliance].count++;alliances[d.alliance].coords.push(d.coords);alliances[d.alliance].galaxies.add(d.galaxy);
    }
  });
  const list = Object.values(alliances).sort((a,b)=>b.count-a.count);
  const el = document.getElementById('alliancesList');
  if(!list.length){el.innerHTML='<div class="empty">No alliances found</div>';return;}
  el.innerHTML = list.map(a=>`
    <div class="alliance-card" onclick="showAlliance('${a.name.replace(/'/g,"\'")}')">
      <div>
        <div style="font-weight:700;color:var(--green)">${a.name}</div>
        <div style="font-size:.8rem;color:var(--muted)">${a.players.size} players &bull; ${a.count} planets &bull; Galaxies: ${[...a.galaxies].join(', ')}</div>
        <div style="font-size:.75rem;color:var(--muted);margin-top:4px">${a.coords.slice(0,6).join(', ')}${a.coords.length>6?'...':''}</div>
      </div>
      <div class="count">${a.count}</div>
    </div>
  `).join('');
}

function renderSystems(){
  const g = document.getElementById('sysGalaxy').value;
  const s = document.getElementById('sysSystem').value;
  let results = ALL_DATA;
  if(g)results = results.filter(d=>String(d.galaxy)===g);
  if(s)results = results.filter(d=>String(d.system)===s);
  const el = document.getElementById('systemResults');
  if(!results.length){el.innerHTML='<div class="empty">Enter a galaxy and system number</div>';return;}
  const systems = {};
  results.forEach(d=>{const key=d.galaxy+':'+d.system;if(!systems[key])systems[key]={galaxy:d.galaxy,system:d.system,planets:[]};systems[key].planets.push(d);});
  el.innerHTML = Object.values(systems).sort((a,b)=>a.galaxy-b.galaxy||a.system-b.system).map(sys=>`
    <div class="system-detail">
      <h4>Galaxy ${sys.galaxy} : System ${sys.system} <span style="color:var(--muted);font-size:.8rem">(${sys.planets.length} planets)</span></h4>
      <div class="slot-grid">
        ${Array.from({length:15},(_,i)=>{const slot=i+1;const p=sys.planets.find(x=>x.slot===slot);if(!p)return`<div class="slot-cell">${slot}</div>`;const isMoon=p.planet&&(p.planet.includes('(m)')||p.planet.includes('(*)'));return`<div class="slot-cell ${isMoon?'moon':'occupied'}" title="${p.coords} | ${p.planet||'Planet'} | ${p.player}">${slot}<br><span style="font-size:.6rem">${p.player.substring(0,8)}</span></div>`;}).join('')}
      </div>
      <table style="margin-top:10px;font-size:.85rem">
        <thead><tr><th>Slot</th><th>Planet</th><th>Player</th><th>Alliance</th><th>Rank</th></tr></thead>
        <tbody>
          ${sys.planets.sort((a,b)=>a.slot-b.slot).map(p=>`<tr><td class="coords">${p.slot}</td><td>${p.planet||'-'}</td><td class="player-link" onclick="showPlayer('${p.player.replace(/'/g,"\'")}')">${p.player}${p.rank?'<span class="rank-badge">#'+p.rank+'</span>':''}</td><td>${p.alliance?'<span class="alliance-tag">'+p.alliance+'</span>':'-'}</td><td>${p.rank||'-'}</td></tr>`).join('')}
        </tbody>
      </table>
    </div>
  `).join('');
}

function renderTable(){
  const q = document.getElementById('tableSearch').value.toLowerCase();
  const g = document.getElementById('tableGalaxy').value;
  const a = document.getElementById('tableAlliance').value;
  let results = ALL_DATA.filter(d=>(!q||JSON.stringify(d).toLowerCase().includes(q))&&(!g||String(d.galaxy)===g)&&(!a||d.alliance===a));
  results.sort((a,b)=>{let va=a[SORT.col]||'',vb=b[SORT.col]||'';const na=parseInt(va),nb=parseInt(vb);if(!isNaN(na)&&!isNaN(nb)){va=na;vb=nb;}else{va=String(va).toLowerCase();vb=String(vb).toLowerCase();}if(va<vb)return SORT.asc?-1:1;if(va>vb)return SORT.asc?1:-1;return 0;});
  const el = document.getElementById('tableBody');
  el.innerHTML = results.map(d=>{
    const statusHtml = d.status ? d.status.split('').map(s=>`<span class="status-dot status-${s}"></span>${s}`).join(' ') : '-';
    return `<tr><td class="coords">${d.coords}</td><td>${d.planet||'-'}</td><td class="player-link" onclick="showPlayer('${d.player.replace(/'/g,"\'")}')">${d.player}${d.rank?'<span class="rank-badge">#'+d.rank+'</span>':''}</td><td>${d.rank||'-'}</td><td>${d.alliance?'<span class="alliance-tag">'+d.alliance+'</span>':'-'}</td><td>${statusHtml}</td></tr>`;
  }).join('');
}

function sortTable(col){if(SORT.col===col)SORT.asc=!SORT.asc;else{SORT.col=col;SORT.asc=true;}renderTable();}

function showPlayer(name){document.getElementById('playerSearch').value=name;switchTab('players');renderPlayers();}
function showAlliance(name){document.getElementById('allianceSearch').value=name;switchTab('alliances');renderAlliances();}

function exportJSON(){
  const blob = new Blob([JSON.stringify(ALL_DATA,null,2)],{type:'application/json'});
  const a = document.createElement('a');a.href=URL.createObjectURL(blob);a.download='sfc2_intel_export.json';a.click();
  showToast('Exported '+ALL_DATA.length+' records');
}

function exportCSV(){
  const headers = ['coords','galaxy','system','slot','planet','player','rank','alliance','status'];
  let csv = headers.join(',')+'\n';
  ALL_DATA.forEach(d=>{csv += headers.map(h=>'"'+((d[h]||'')+'').replace(/"/g,'""')+'"').join(',')+'\n';});
  const blob = new Blob([csv],{type:'text/csv'});
  const a = document.createElement('a');a.href=URL.createObjectURL(blob);a.download='sfc2_intel_export.csv';a.click();
  showToast('Exported '+ALL_DATA.length+' records');
}

function showToast(msg){
  const t = document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}

function updateDashboard(){updateStats();updateHeatmaps();updateFilters();dashboardSearch();updateTopAlliances();}

updateDashboard();
renderTable();
